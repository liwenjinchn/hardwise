name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.os }} / Python 3.11
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Check lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

  frontend:
    name: Frontend contracts / Node 24
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/workbench/package-lock.json

      - name: Install backend dependencies
        run: uv sync --locked

      - name: Install frontend dependencies
        working-directory: frontend/workbench
        run: npm ci

      - name: Check backend/frontend contracts and types
        working-directory: frontend/workbench
        run: npm run typecheck

      - name: Run frontend unit tests
        working-directory: frontend/workbench
        run: npm run test:unit

      - name: Build frontend
        working-directory: frontend/workbench
        run: npm run build
